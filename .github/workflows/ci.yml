name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

# Needed by the deploy job to publish to GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Run JavaScript actions on Node 24 already. Some GitHub Pages actions still
# bundle Node 20 internally (e.g. upload-pages-artifact → upload-artifact),
# which is deprecated; this opt-in silences the warning and is mandatory from
# 2026-06-16 onward.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Type-check & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript – type check
        run: npx tsc --project tsconfig.app.json

      - name: ESLint – code rules & documentation
        run: npm run lint -- --max-warnings 0

      - name: Prettier – formatting check
        run: npm run format:check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vitest – run test suite
        run: npm test

  # Build + deploy to GitHub Pages. Only on the main branch, and only after
  # check and test have passed. On pull requests / other branches these jobs
  # are skipped, so the run shows just check + test.
  build:
    name: Build Pages
    needs: [check, test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (type-check + Vite production build)
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Serialise Pages deployments; never cancel one in progress.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
